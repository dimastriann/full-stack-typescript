services:
  postgres:
    image: postgres:17.0
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD:-mypassword}@postgres:5432/${POSTGRES_DB:-mydatabase}
      PORT: 3000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-mysecretkey}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      # Redis session store
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Superadmin seed (only used during prisma db seed)
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-superadmin@app.com}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-SuperAdmin@123!}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "8080:80" # Map host port 8080 to container port 80
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
